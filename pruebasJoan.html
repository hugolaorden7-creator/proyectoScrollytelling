<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProyectoScrollytelling</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      .in {
        margin-top: 100vh;
      }
      .boxA {
        width: 100px;
        height: 100px;
        background: red;
        margin-top: 10vh;
      }
      .boxB {
        width: 100px;
        height: 100px;
        background: rgb(102, 255, 0);
        margin-top: 10vh;
      }
      .boxC {
        width: 100px;
        height: 100px;
        background: rgb(0, 247, 255);
        margin-top: 10vh;
      }

      .boxD {
        width: 100px;
        height: 100px;
        background: rgb(0, 4, 255);
        margin-top: 10vh;
      }

      .boxE {
        width: 100px;
        height: 100px;
        background: rgb(255, 0, 238);
        margin-top: 10vh;
      }
      .box {
        width: 100px;
        height: 100px;
        background: red;
        margin-top: 100vh;
      }
    </style>
  </head>
  <body class="body">
    <!--Primera página-->
    <section class="pagina-col justify-center items-center text-center pagina-1">
      <h1 class="text-4xl font-bold">Baja para descubrir ↓</h1>

      <button
        class="p-2 flex justify-center items-center dark:text-white btn-cambiar-tema fixed right-4 top-4 text-3xl"
        id="theme-switch"
      >
        <span
          class="icon-[lineicons--night] dark:icon-[material-symbols--light-mode-rounded]"
        ></span>
      </button>

      <p class="mt-6 animate-bounce">↓ Scroll</p>

      <p class="mt-60 animate-pulse capitalize">Joan & hugo</p>
    </section>

    <!--Segunda página-->
    <section
      class="bg-gray-900 pagina-col justify-center items-center text-center pagina-2"
    >
      <h1 class="text-4xl font-bold">Primer proyecto</h1>
        <section class="flex flex-row items-center figma">
            <img src="/figma.svg" class="figma-logo w-30">
            <h2 class="figma-title text-4xl">Figma</h2>
        </section>

    </section>

    <!-- <div class="pagina justify-between items-center relative">
      <h1>Baja para ver el efecto de revelado ↓</h1>
      <button class="p-2 rounded-md" id="theme-switch">
        <span
          class="icon-[lineicons--night] dark:icon-[material-symbols--light-mode-rounded]"
        ></span>
      </button>
    </div> -->

    <!--Ejemplos-->

    <div class="boxA">a</div>
    <div class="boxB">b</div>
    <div class="boxC">c</div>
    <div class="boxD">D</div>
    <div class="boxE">E</div>

    <div class="box"></div>
    <!--Contenido principal-->

    <!--Script-->
    <script type="module" src="/src/main.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);
        gsap.to('.pagina-2', {
            scrollTrigger: {
                trigger: '.pagina-2',
                pin:true,                
                start: 'top top',
                end: '+=1000',
            }
        })
        gsap.fromTo('.figma-logo', {
            width: 300,
        },{
            width: 100,
            scrollTrigger: {
                trigger: '.figma-logo',
                start: '+=300',
                end: '+=1000',
                toggleActions: "restart pause reverse pause"
            }
        })

        gsap.fromTo('.figma-title', {
            opacity: 0,
            display: 'none'
        },{
            opacity: 1,
            display: 'block',
            scrollTrigger: {
            
                trigger: '.figma-title',
                start: '+=300',
                end: '+=1000',
                toggleActions: "restart pause reverse pause"
            }
        })
    </script>
  </body>
</html>
