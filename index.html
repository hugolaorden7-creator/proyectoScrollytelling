    <style>

  <body class="body">

    <section class="pagina-col justify-center items-center text-center">

      <button

          class="icon-[lineicons--night] dark:icon-[material-symbols--light-mode-rounded]"

      <p class="mt-6 animate-bounce">↓ Scroll</p>

    <!--Segunda página-->

    </section>
