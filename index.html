<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProyectoScrollytelling</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      .in {
        margin-top: 100vh;
      }
      .boxA {
        width: 100px;
        height: 100px;
        background: red;
        margin-top: 10vh;
      }
      .boxB {
        width: 100px;
        height: 100px;
        background: rgb(102, 255, 0);
        margin-top: 10vh;
      }
      .boxC {
        width: 100px;
        height: 100px;
        background: rgb(0, 247, 255);
        margin-top: 10vh;
      }

      .boxD {
        width: 100px;
        height: 100px;
        background: rgb(0, 4, 255);
        margin-top: 10vh;
      }

      .boxE {
        width: 100px;
        height: 100px;
        background: rgb(255, 0, 238);
        margin-top: 10vh;
      }
      .box {
        width: 100px;
        height: 100px;
        background: red;
        margin-top: 100vh;
      }
    </style>

  <body class="body">
    <!--Primera página-->
    <section
      class="pagina-col justify-center items-center text-center pagina-1"
    >
      <h1 class="text-4xl font-bold">Baja para descubrir ↓</h1>

      <button
        class="p-2 flex justify-center items-center dark:text-white btn-cambiar-tema fixed right-4 top-4 text-3xl"
        id="theme-switch"
      >
        <span
          class="icon-[lineicons--night] dark:icon-[material-symbols--light-mode-rounded]"
        ></span>
      </button>

      <p class="mt-6 animate-bounce">↓ Scroll</p>
      <h2 class="text-2xl mt-30 inicio-descripcion">Proyecto ScrollyTelling</h2>
      <span class="icon-[lineicons--night] giro"></span>

      <p class="mt-60 animate-pulse capitalize">Joan & hugo</p>
    </section>

    <!--Segunda página-->
    <section
      class="bg-gray-900 pagina-col justify-center items-center text-center pagina-2"
    >
      <h1 class="text-4xl font-bold">Primer proyecto</h1>
      <!--Contenedor principal-->
      <section class="flex flex-row items-center figma">
        <img src="/figma.svg" class="figma-logo w-30" />
        <h2 class="figma-title text-4xl">Figma</h2>
      </section>
      <div class="figma-descripcion"><p>Hola esto es una descripcion</p></div>

      <!--Cajas contenido-->
      <section class="flex flex-row items-center gap-10 m-10 figma-cajas">
        <!--Caja1-->
        <div class="figma-caja">
          <div class="h-70">
            <!--El " blur-sm "es para el difucminado-->
            <img
              src="img/zelda.jpg"
              class="w-full h-full object-cover border-2 border-slate-400"
              alt="Obra"
            />
          </div>
          <h3 class="text-lg">Titulo</h3>
          <p class="uppercase text-xs text-descripciones">Descripcion</p>
        </div>

        <!--Caja2-->

        <div class="figma-caja">
          <div class="h-70">
            <!--El " blur-sm "es para el difucminado-->
            <img
              src="img/zelda.jpg"
              class="w-full h-full object-cover border-2 border-slate-400"
              alt="Obra"
            />
          </div>
          <h3 class="text-lg">Titulo</h3>
          <p class="uppercase text-xs text-descripciones">Descripcion</p>
        </div>

        <!--Caja3-->

        <div class="figma-caja">
          <div class="h-70">
            <!--El " blur-sm "es para el difucminado-->
            <img
              src="img/zelda.jpg"
              class="w-full h-full object-cover border-2 border-slate-400"
              alt="Obra"
            />
          </div>
          <h3 class="text-lg">Titulo</h3>
          <p class="uppercase text-xs text-descripciones">Descripcion</p>
        </div>
      </section>
    </section>
    <!--Segunda página-->
    <section
      class="bg-gray-900 pagina-col justify-center items-center text-center pagina-3"
    >
      <div class="descripcion"><p>Hola esto es una descripcion</p></div>
    </section>
